<!DOCTYPE html><html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Pagamentos | Checkout Seguro</title><script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
    }
    .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .gradient-text {
        background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .btn-primary {
        background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
        transition: all 0.3s ease;
    }
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        filter: brightness(1.1);
    }
    .plan-card {
        transition: all 0.3s ease;
        cursor: pointer;
        border: 2px solid transparent;
    }
    .plan-card.active {
        border-color: #38bdf8;
        background: rgba(56, 189, 248, 0.1);
    }
    .loader {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top: 3px solid #38bdf8;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>

</head><body class="min-h-screen flex items-center justify-center p-4"><div class="max-w-md w-full glass-card rounded-3xl shadow-2xl overflow-hidden">
    <div class="p-8 text-center border-b border-white/10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-sky-500/20 rounded-2xl mb-4">
            <i class="fas fa-tv text-3xl text-sky-400"></i>
        </div>
        <h1 class="text-2xl font-bold gradient-text">IPTV Pagamentos</h1>
        <p class="text-slate-400 text-sm mt-1">Ativação imediata após o pagamento</p>
    </div>

    <div id="main-container" class="p-8">
        <div id="selection-view">
            <label class="block text-sm font-medium text-slate-300 mb-4">Selecione seu plano:</label>
            
            <div class="space-y-3 mb-8">

                <div onclick="selectPlan(this, 15, 'Mensal')" class="plan-card active p-4 rounded-2xl bg-white/5 flex items-center justify-between">
                    Plano Mensal - R$ 15
                </div>

                <div onclick="selectPlan(this, 45, 'Trimestral')" class="plan-card p-4 rounded-2xl bg-white/5 flex items-center justify-between">
                    Plano Trimestral - R$ 45
                </div>

                <div onclick="selectPlan(this, 160, 'Anual')" class="plan-card p-4 rounded-2xl bg-white/5 flex items-center justify-between">
                    Plano Anual - R$ 160
                </div>

            </div>

            <button onclick="pagar()" class="w-full btn-primary py-4 rounded-2xl font-bold text-white">
                Gerar Pagamento Pix
            </button>
        </div>

        <div id="conteudo" class="hidden"></div>
    </div>
</div>

<script>
let transactionId;
let selectedValue = 15;
let selectedPlanName = "Mensal";

function selectPlan(el, value, name){
document.querySelectorAll('.plan-card').forEach(c=>c.classList.remove('active'));
el.classList.add('active');
selectedValue=value;
selectedPlanName=name;
}

async function pagar(){
document.getElementById("selection-view").style.display="none";

const c = document.getElementById("conteudo");
c.classList.remove("hidden");

c.innerHTML = '<div class="loader"></div><p>Gerando Pix...</p>';

const res = await fetch("/api/criar-pix",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({plano:selectedPlanName})
});

const data = await res.json();
transactionId = data.data.transactionId;

c.innerHTML = `
<img src="${data.data.qrcodeUrl}" width="200">

<textarea id="pixCode" class="w-full mt-2">${data.data.copyPaste}</textarea><button onclick="copiarPix()">Copiar Pix</button>

<p id="status">Aguardando pagamento...</p>
`;verificar();
}

function copiarPix(){
navigator.clipboard.writeText(document.getElementById("pixCode").value);
alert("Copiado!");
}

async function verificar(){
const i = setInterval(async()=>{
const res = await fetch("/api/verificar",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({transactionId})
});
const d = await res.json();

if(d.transaction.transactionState==="COMPLETO"){
clearInterval(i);

document.getElementById("conteudo").innerHTML = `

<h2>Pagamento aprovado</h2><p>Plano: ${selectedPlanName}</p>
<p>ID: ${d.transaction.transactionId}</p>
<p>Valor: R$ ${d.transaction.value}</p><button onclick="baixarComprovante('${d.transaction.transactionId}','${d.transaction.value}','${selectedPlanName}')">
Baixar PDF
</button>
`;
}},5000);
}

/* 🔥 FUNÇÃO ADICIONADA */
function baixarComprovante(id, valor, plano) {
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

const dataAtual = new Date().toLocaleDateString('pt-BR');

doc.setFontSize(18);
doc.text("Comprovante de Pagamento", 20, 20);

doc.setFontSize(12);
doc.text(`Plano: ${plano}`, 20, 40);
doc.text(`ID: ${id}`, 20, 50);
doc.text(`Valor: R$ ${valor}`, 20, 60);
doc.text(`Data: ${dataAtual}`, 20, 70);

doc.text("Pagamento aprovado com sucesso.", 20, 90);

doc.save("comprovante.pdf");

}
</script>

</body>
</html>
