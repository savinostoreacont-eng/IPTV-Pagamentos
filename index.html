<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Pagamentos | Checkout Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            filter: brightness(1.1);
        }
        .plan-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .plan-card.active {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
        }
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid #38bdf8;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="p-8 text-center border-b border-white/10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-sky-500/20 rounded-2xl mb-4">
                <i class="fas fa-tv text-3xl text-sky-400"></i>
            </div>
            <h1 class="text-2xl font-bold gradient-text">IPTV Pagamentos</h1>
            <p class="text-slate-400 text-sm mt-1">Ativação imediata após o pagamento</p>
        </div>

        <!-- Main Content -->
        <div id="main-container" class="p-8">
            <div id="selection-view">
                <label class="block text-sm font-medium text-slate-300 mb-4">Selecione seu plano:</label>
                
                <div class="space-y-3 mb-8">
                    <!-- Plan 1 -->
                    <div onclick="selectPlan(this, 15, 'Mensal')" class="plan-card active p-4 rounded-2xl bg-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-sky-500/20 flex items-center justify-center">
                                <i class="fas fa-calendar-alt text-sky-400"></i>
                            </div>
                            <div>
                                <p class="font-semibold">Plano Mensal</p>
                                <p class="text-xs text-slate-400">30 dias de acesso</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-bold text-white">R$ 15</p>
                        </div>
                    </div>

                    <!-- Plan 2 -->
                    <div onclick="selectPlan(this, 45, 'Trimestral')" class="plan-card p-4 rounded-2xl bg-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center">
                                <i class="fas fa-layer-group text-indigo-400"></i>
                            </div>
                            <div>
                                <p class="font-semibold">Plano Trimestral</p>
                                <p class="text-xs text-slate-400">90 dias de acesso</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-bold text-white">R$ 45</p>
                            <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded-full uppercase font-bold">Economize</span>
                        </div>
                    </div>

                    <!-- Plan 3 -->
                    <div onclick="selectPlan(this, 160, 'Anual')" class="plan-card p-4 rounded-2xl bg-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-purple-500/20 flex items-center justify-center">
                                <i class="fas fa-crown text-purple-400"></i>
                            </div>
                            <div>
                                <p class="font-semibold">Plano Anual</p>
                                <p class="text-xs text-slate-400">365 dias de acesso</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-bold text-white">R$ 160</p>
                            <span class="text-[10px] bg-purple-500/20 text-purple-400 px-2 py-0.5 rounded-full uppercase font-bold">Melhor Valor</span>
                        </div>
                    </div>
                </div>

                <button onclick="pagar()" id="pay-button" class="w-full btn-primary py-4 rounded-2xl font-bold text-white flex items-center justify-center gap-2 shadow-lg">
                    <span>Gerar Pagamento Pix</span>
                    <i class="fas fa-arrow-right text-sm"></i>
                </button>
            </div>

            <div id="conteudo" class="hidden flex flex-col items-center text-center py-4">
                <!-- Dynamic content will be injected here -->
            </div>
        </div>

        <!-- Footer -->
        <div class="px-8 py-4 bg-black/20 text-center">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold flex items-center justify-center gap-2">
                <i class="fas fa-shield-alt"></i> Pagamento 100% Seguro via Pix
            </p>
        </div>
    </div>

    <script>
        let transactionId;
        let selectedValue = 15;
        let selectedPlanName = "Mensal";

        function selectPlan(element, value, name) {
            // Update selection UI
            document.querySelectorAll('.plan-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
            
            // Update values
            selectedValue = value;
            selectedPlanName = name;
        }

        async function pagar() {
            const selectionView = document.getElementById("selection-view");
            const conteudo = document.getElementById("conteudo");
            
            selectionView.classList.add("hidden");
            conteudo.classList.remove("hidden");
            
            conteudo.innerHTML = `
                <div class="flex flex-col items-center py-12">
                    <div class="loader mb-4"></div>
                    <p class="text-slate-300 animate-pulse">Gerando seu código Pix...</p>
                </div>
            `;

            try {
                // Nota: Mantendo a mesma lógica de API do original
                // Adicionando o valor selecionado no corpo da requisição se a API suportar
                const res = await fetch("/api/criar-pix", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ 
                        valor: selectedValue,
                        plano: selectedPlanName
                    })
                });

                const data = await res.json();
                transactionId = data.data.transactionId;

                conteudo.innerHTML = `
                    <div class="w-full">
                        <div class="bg-white p-4 rounded-2xl mb-6 inline-block shadow-inner">
                            <img src="${data.data.qrcodeUrl}" class="w-48 h-48" alt="QR Code Pix"/>
                        </div>
                        
                        <div class="text-left mb-6">
                            <p class="text-xs text-slate-400 uppercase font-bold mb-2">Código Pix (Copia e Cola)</p>
                            <div class="relative">
                                <textarea id="pixCode" readonly class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-xs text-slate-300 h-20 focus:outline-none resize-none">${data.data.copyPaste}</textarea>
                                <button onclick="copiarPix()" class="absolute bottom-2 right-2 bg-sky-500 hover:bg-sky-600 text-white text-[10px] px-3 py-1.5 rounded-lg font-bold transition-colors">
                                    <i class="fas fa-copy mr-1"></i> COPIAR
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-center gap-3 p-4 bg-sky-500/10 rounded-2xl border border-sky-500/20 mb-6">
                            <div class="loader !w-4 !h-4 !border-2"></div>
                            <p id="status" class="text-sm text-sky-400 font-medium">Aguardando confirmação...</p>
                        </div>

                        <button onclick="location.reload()" class="text-slate-500 text-xs hover:text-slate-300 transition-colors">
                            <i class="fas fa-times mr-1"></i> Cancelar e voltar
                        </button>
                    </div>
                `;

                verificarPagamento();
            } catch (error) {
                conteudo.innerHTML = `
                    <div class="py-8">
                        <i class="fas fa-exclamation-circle text-red-400 text-4xl mb-4"></i>
                        <p class="text-slate-300">Erro ao gerar pagamento. Tente novamente.</p>
                        <button onclick="location.reload()" class="mt-4 btn-primary px-6 py-2 rounded-xl text-sm font-bold">Recarregar</button>
                    </div>
                `;
            }
        }

        function copiarPix() {
            const codigo = document.getElementById("pixCode").value;
            navigator.clipboard.writeText(codigo).then(() => {
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check mr-1"></i> COPIADO';
                btn.classList.replace('bg-sky-500', 'bg-green-500');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-green-500', 'bg-sky-500');
                }, 2000);
            });
        }

        async function verificarPagamento() {
            const intervalo = setInterval(async () => {
                try {
                    const res = await fetch("/api/verificar", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({ transactionId })
                    });

                    const data = await res.json();

                    if (data.transaction.transactionState === "COMPLETO") {
                        clearInterval(intervalo);

                        document.getElementById("conteudo").innerHTML = `
                            <div class="py-6">
                                <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i class="fas fa-check text-4xl text-green-500"></i>
                                </div>
                                <h2 class="text-2xl font-bold text-white mb-2">Pagamento Aprovado!</h2>
                                <p class="text-slate-400 text-sm mb-8">Seu acesso foi liberado com sucesso.</p>
                                
                                <div class="bg-white/5 rounded-2xl p-4 text-left mb-8 space-y-2">
                                    <div class="flex justify-between text-xs">
                                        <span class="text-slate-500">ID Transação:</span>
                                        <span class="text-slate-300 font-mono">${data.transaction.transactionId}</span>
                                    </div>
                                    <div class="flex justify-between text-xs">
                                        <span class="text-slate-500">Valor Pago:</span>
                                        <span class="text-green-400 font-bold">R$ ${data.transaction.value}</span>
                                    </div>
                                    <div class="flex justify-between text-xs">
                                        <span class="text-slate-500">Data:</span>
                                        <span class="text-slate-300">${new Date().toLocaleDateString('pt-BR')}</span>
                                    </div>
                                </div>

                                <button onclick="baixarComprovante('${data.transaction.transactionId}','${data.transaction.value}','${selectedPlanName}')" class="w-full bg-white/10 hover:bg-white/20 py-3 rounded-xl font-bold text-white transition-all flex items-center justify-center gap-2">
    <i class="fas fa-download"></i> Baixar Comprovante
</button>
                            </div>
                        `;
                    }
                } catch (e) {
                    console.error("Erro ao verificar status:", e);
                }
            }, 5000);

            function baixarComprovante(id, valor, plano) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const dataAtual = new Date().toLocaleDateString('pt-BR');

    doc.setFontSize(18);
    doc.text("Comprovante de Pagamento", 20, 20);

    doc.setFontSize(12);
    doc.text(`Plano: ${plano}`, 20, 40);
    doc.text(`ID: ${id}`, 20, 50);
    doc.text(`Valor: R$ ${valor}`, 20, 60);
    doc.text(`Data: ${dataAtual}`, 20, 70);

    doc.text("Pagamento aprovado com sucesso.", 20, 90);

    doc.save("comprovante.pdf");
                
            }
        }
    </script>

</body>
</html>
